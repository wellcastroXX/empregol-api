name: empregol

services:
  db:
    image: postgres:16-alpine
    container_name: empregol-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-empregol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-empregol}
    volumes:
      # Dados do banco ficam dentro do repo (que está no SSD Kingston)
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-empregol} -d ${POSTGRES_DB:-empregol}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - empregol-net

  api:
    build: .
    container_name: empregol-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-empregol}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-empregol}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: 3000
      NODE_ENV: production
    ports:
      # Exposto na LAN para o frontend de dev acessar (http://IP_DO_SERVIDOR:3000).
      # Para publicar via domínio público, prefira colocar atrás do Traefik.
      - "${API_PORT:-3000}:3000"
    networks:
      - empregol-net

networks:
  empregol-net:
    driver: bridge
