name: empregol

services:
  db:
    image: postgres:16-alpine
    container_name: empregol-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-empregol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-empregol}
    volumes:
      # Dados do banco ficam dentro do repo (que está no SSD Kingston)
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-empregol} -d ${POSTGRES_DB:-empregol}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - empregol-net

  api:
    build: .
    container_name: empregol-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-empregol}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-empregol}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # Login social (Firebase Admin) — JSON do service account inline no .env do servidor
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      PORT: 3000
      NODE_ENV: production
    ports:
      # Mantido para acesso direto na LAN (http://192.168.3.197:3000), além do domínio público.
      - "${API_PORT:-3000}:3000"
    networks:
      - empregol-net
      - proxy
    labels:
      # Publicação via Traefik + Cloudflare Tunnel (TLS no edge da Cloudflare, HTTP no entrypoint web)
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.empregol-api.entrypoints=web"
      - "traefik.http.routers.empregol-api.rule=Host(`${API_DOMAIN:-api.empregolstartup.com.br}`)"
      - "traefik.http.services.empregol-api.loadbalancer.server.port=3000"

networks:
  empregol-net:
    driver: bridge
  proxy:
    external: true
